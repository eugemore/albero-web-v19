type AuthResponse {
  expiresAt: Float!
  idToken: String!
}

type CiudadaniaDocument {
  _id: ID!
  createdAt: DateTime
  issueDate: String
  issuingAuthority: String
  notes: String
  owner: ID!
  person: ID!
  referenceNumber: String
  status: DocumentStatus!
  type: String!
  updatedAt: DateTime
}

input CreateDocumentInput {
  issueDate: String
  issuingAuthority: String
  notes: String
  personId: ID!
  referenceNumber: String
  status: DocumentStatus
  type: String!
}

input CreateFamilyInput {
  name: String!
  notes: String
}

input CreatePersonInput {
  dateOfBirth: String
  familyId: ID!
  firstName: String!
  lastName: String!
  notes: String
  parentId: ID
  placeOfBirth: String
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

"""Current status of a citizenship document."""
enum DocumentStatus {
  """Accepted — document has been approved."""
  ACEPTADO

  """Not accepted — document was rejected or requires correction."""
  NO_ACEPTADO

  """Pending — document not yet submitted or under review."""
  PENDIENTE
}

type Family {
  _id: ID!
  createdAt: DateTime
  name: String!
  notes: String
  owner: ID!
  updatedAt: DateTime
}

input LoginInput {
  email: String!
  password: String!
}

type Mutation {
  createDocument(input: CreateDocumentInput!): CiudadaniaDocument!
  createFamily(input: CreateFamilyInput!): Family!
  createPerson(input: CreatePersonInput!): Person!
  login(input: LoginInput!): AuthResponse!
  register(input: RegisterInput!): String!
  removeDocument(id: ID!): ID!
  removeFamily(id: ID!): ID!
  removePerson(id: ID!): ID!
  updateDocument(input: UpdateDocumentInput!): CiudadaniaDocument!
  updateFamily(input: UpdateFamilyInput!): Family!
  updatePerson(input: UpdatePersonInput!): Person!
  verifyEmail(code: String!): String!
}

type Person {
  _id: ID!
  createdAt: DateTime
  dateOfBirth: String
  family: ID!
  firstName: String!
  lastName: String!
  notes: String
  owner: ID!
  parent: ID
  placeOfBirth: String
  updatedAt: DateTime
}

type Query {
  document(id: ID!): CiudadaniaDocument!
  documentsByPerson(personId: ID!): [CiudadaniaDocument!]!
  documentsByStatus(status: DocumentStatus!): [CiudadaniaDocument!]!
  families: [Family!]!
  family(id: ID!): Family!
  me: User!
  person(id: ID!): Person!
  personsByFamily(familyId: ID!): [Person!]!
}

input RegisterInput {
  email: String!
  password: String!
}

input UpdateDocumentInput {
  id: ID!
  issueDate: String
  issuingAuthority: String
  notes: String
  referenceNumber: String
  status: DocumentStatus
  type: String
}

input UpdateFamilyInput {
  id: ID!
  name: String
  notes: String
}

input UpdatePersonInput {
  dateOfBirth: String
  firstName: String
  id: ID!
  lastName: String
  notes: String
  parentId: ID
  placeOfBirth: String
}

type User {
  _id: ID!
  active: Boolean!
  createdAt: DateTime
  email: String!
}