<nav class="form-header">
  <h2>Sign Up</h2>
</nav>
<mat-card-content>
  <form [formGroup]="form" class="form">
    <mat-form-field appearance="fill">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword">
    </mat-form-field>
  </form>
  @if (signUpError()) {
    <p class="alert-message">{{ signUpError() }}</p>
  }
</mat-card-content>
<mat-card-actions class="actions">
  <button mat-raised-button [disabled]="!form.valid" color="primary" (click)="signup()">Sign up</button>
  <button mat-stroked-button color="primary" (click)="signupOutput.emit()">I have an account</button>
</mat-card-actions>
