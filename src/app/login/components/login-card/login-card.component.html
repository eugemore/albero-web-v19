<nav class="form-header">
  <h2>Login</h2>
</nav>
<mat-card-content>
  <form [formGroup]="form" class="form">
    <mat-form-field appearance="fill">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>
  </form>
</mat-card-content>
<mat-card-actions class="actions">
  <button mat-raised-button [disabled]="!form.valid" color="primary" (click)="login()">Log In</button>
  <button mat-stroked-button color="primary" (click)="signupOutput.emit()">Register</button>
  @if (wrongPassword()) {
    <p class="alert-message">Wrong username or password.</p>
  }
</mat-card-actions>
