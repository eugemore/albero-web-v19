<mat-toolbar class="nav">
  <div class="albero-wrap nav-inner">
    <button
      type="button"
      class="brand"
      (click)="goHome()"
      aria-label="Albero Project — inicio">
      <span class="mark">
        <img src="assets/img/albero-logo.svg" alt="" />
      </span>
      <span class="brand-name">Albero&nbsp;Project</span>
    </button>

    @if (!isLoggedIn()) {
      <nav class="nav-links" aria-label="Principal">

        <a mat-flat-button class="nav-cta" routerLink="/login">Empezar</a>
      </nav>
    } @else {
      <div class="auth-actions auth-actions--web">
        <button mat-button (click)="goHome()">
          <mat-icon>home</mat-icon> Inicio
        </button>
        <button mat-button>
          <mat-icon>settings</mat-icon> Ajustes
        </button>
        <button mat-button (click)="logOut()">
          <mat-icon>logout</mat-icon> Salir
        </button>
      </div>
      <div class="auth-actions auth-actions--mobile">
        <button mat-icon-button (click)="goHome()" aria-label="Inicio">
          <mat-icon>home</mat-icon>
        </button>
        <button mat-icon-button aria-label="Ajustes">
          <mat-icon>settings</mat-icon>
        </button>
        <button mat-icon-button (click)="logOut()" aria-label="Salir">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    }
  </div>
</mat-toolbar>
