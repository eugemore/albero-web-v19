@for (person of persons(); track person._id; let i = $index; let last = $last) {
  <app-member-card
    [member]="person"
    [editionBlocked]="editionBlocked()"
    [last]="last"
    (editingOutput)="editPerson(i)"
    (deleteMemberOutput)="deletePerson(i)"
    (addMemberOutput)="addPerson()" />
} @empty {
  <p>No hay personas en esta familia.</p>
}
