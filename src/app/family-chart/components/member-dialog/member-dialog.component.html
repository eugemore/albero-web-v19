<h1 mat-dialog-title>{{ data.person ? 'Edit Person' : 'Add Person' }}</h1>
<div mat-dialog-content>
  <form [formGroup]="personForm">
    <mat-form-field appearance="fill">
      <mat-label>First Name</mat-label>
      <input matInput formControlName="firstName">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="lastName">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Date of Birth</mat-label>
      <input matInput formControlName="dateOfBirth" [matDatepicker]="picker">
      <mat-hint>DD/MM/YYYY</mat-hint>
      <mat-datepicker-toggle matSuffix [for]="picker" />
      <mat-datepicker #picker />
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Place of Birth</mat-label>
      <input matInput formControlName="placeOfBirth">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Parent</mat-label>
      <mat-select formControlName="parentId">
        <mat-option [value]="null">— None —</mat-option>
        @for (person of data.persons; track person._id) {
          @if (!data.person || person._id !== data.person._id) {
            <mat-option [value]="person._id">
              {{ person.firstName }} {{ person.lastName }}
            </mat-option>
          }
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions>
  <button mat-stroked-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="!personForm.valid" (click)="save()">Save</button>
</div>
